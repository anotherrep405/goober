
[gcode_macro UNLOAD_FILAMENT]
gcode = 
	{% set EXTRUDER_TEMP = params.TEMP|default(230)|int %}
	M117 Unloading filament...
	G90
	G1 Z80 F100000
	G1 X150 Y50 F100000
	M109 S{EXTRUDER_TEMP}
	M83
	G1 E3   F300
	G1 E-30 F100000
	G1 E-50 F1800
	G1 E-30 F1800
	M82

[gcode_macro LOAD_FILAMENT]
gcode = 
	{% set EXTRUDER_TEMP = params.TEMP|default(230)|int %}
	M117 Loading filament...
	M83
	G90
	G1 Z80 F100000
	G1 X150 Y50 F100000
	M109 S{EXTRUDER_TEMP}
	G1 E50 F300
	G1 E30 F100
	M82
	M400