
[multi_pin bedfan]
pins = PD12, PD14, PD15


[multi_pin my_fans]
pins = H36:PB15, H36:PB13

[fan]
pin = multi_pin:my_fans
kick_start_time = 0.5
off_below = 0.10

[heater_fan hotend_fan]
pin = H36:PA9
max_power = 1.0
kick_start_time = 0.5
heater = extruder
heater_temp = 50.0

[heater_fan controller_fan2]
pin = PD13
max_power = 1.0
shutdown_speed = 0.0
kick_start_time = 5.0
heater = heater_bed
heater_temp = 15
fan_speed = .75