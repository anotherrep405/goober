
[stepper_x]
step_pin = PF13
dir_pin = !PF12
enable_pin = !PF14
rotation_distance = 40
microsteps = 16
full_steps_per_rotation = 400
endstop_pin = tmc2209_stepper_x:virtual_endstop
position_min = 0
position_endstop = 350
position_max = 350
homing_speed = 80
homing_retract_dist = 0
homing_positive_dir = true

[tmc2209 stepper_x]
uart_pin = PC4
diag_pin = ^PG6
driver_sgthrs = 160
interpolate = True
run_current = 0.8
hold_current = 0.6
sense_resistor = 0.110
stealthchop_threshold = 0

[stepper_y]
step_pin = PG0
dir_pin = !PG1
enable_pin = !PF15
rotation_distance = 40
microsteps = 16
full_steps_per_rotation = 400
endstop_pin = tmc2209_stepper_y:virtual_endstop
position_min = 0
position_endstop = 350
position_max = 350
homing_speed = 80
homing_retract_dist = 0
homing_positive_dir = true

[tmc2209 stepper_y]
uart_pin = PD11
interpolate = True
diag_pin = ^PG9
driver_sgthrs = 145
run_current = 0.8
hold_current = 0.6
sense_resistor = 0.110
stealthchop_threshold = 0